{{ define "main" }}
<div class="recent-posts">
  <div class="posts">
    {{ $paginator := .Paginate (where .Site.RegularPages "Section" "posts") }}
    {{ range $paginator.Pages }}
    {{ partial "post-list-item.html" . }}
    {{ end }}
  </div>
  {{ partial "pagination.html" $paginator }}
</div>
{{ end }}
