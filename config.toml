defaultContentLanguage = "pt-br"
locale = "pt-BR"
title = "Carlos Rabelo"
theme = "mytheme"

baseURL = "https://carlosrabelo.com.br/"

[pagination]
  pagerSize = 10

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = -110
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    pageRef = "/posts"
    weight = -200
  [[menu.main]]
    identifier = "codes"
    name = "Codes"
    pageRef = "/codes"
    weight = -150

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[outputFormats.RSS]
  mediatype = "application/rss"
  baseName = "atom"

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "feed"

[params]
  author = "Carlos Rabelo"
  description = "Tecnologia, programação, open source e inovação no serviço público por Carlos Rabelo."
  logo = "/assets/og-default.png"
  images = ["/assets/og-default.png"]
  copyright = "Carlos Rabelo"
  # Uncomment githubRepo after installing the Utterances app on the repository.
  [params.comments]
    # githubRepo = "carlosrabelo/carlosrabelo.com.br"
    theme = "preferred-color-scheme"

[services.googleAnalytics]
  id = "G-N3LMSLTCQR"

[privacy.googleAnalytics]
  disable = false
  respectDoNotTrack = true

enableGitInfo = true
